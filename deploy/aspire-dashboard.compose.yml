services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: unless-stopped
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "false"
      ASPIRE_DASHBOARD_FORWARDEDHEADERS_ENABLED: "true"
    expose:
      - "18888"
      - "18889"
      - "18890"
