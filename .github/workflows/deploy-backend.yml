name: Deploy Backend

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - .github/workflows/deploy-backend.yml
      - Directory.Build.props
      - Directory.Packages.props
      - WorldCupBets.sln
      - src/**
      - tests/**

jobs:
  deploy:
    name: Build, Push, Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/worldcupbets-api" >> "$GITHUB_ENV"
          if [ "$GITHUB_REF_NAME" = "develop" ]; then
            echo "IMAGE_TAG=test" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/WorldCupBets.WebApi/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Deploy TEST
        if: github.ref_name == 'develop'
        run: |
          for i in 1 2 3 4 5; do
            curl --fail --show-error --silent --connect-timeout 10 --max-time 30 -X POST "${{ secrets.DOKPLOY_BACKEND_TEST_WEBHOOK }}" && exit 0
            sleep 5
          done
          exit 1

      - name: Deploy PROD
        if: github.ref_name == 'master' || github.ref_name == 'main'
        run: |
          for i in 1 2 3 4 5; do
            curl --fail --show-error --silent --connect-timeout 10 --max-time 30 -X POST "${{ secrets.DOKPLOY_BACKEND_PROD_WEBHOOK }}" && exit 0
            sleep 5
          done
          exit 1
