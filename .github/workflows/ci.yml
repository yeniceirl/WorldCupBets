name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WorldCupBets.sln

      - name: Build
        run: dotnet build WorldCupBets.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/WorldCupBets.Application.Tests/WorldCupBets.Application.Tests.csproj --configuration Release --no-build --logger trx --results-directory TestResults

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
